<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerMania 🎭 - Entrar</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0f1923;
            background-image: radial-gradient(ellipse at top, #1a2d3d 0%, #0f1923 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .logo {
            font-size: 3em;
            margin-bottom: 5px;
            text-align: center;
        }
        .logo-text {
            color: #f0c040;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .logo-sub {
            color: #667788;
            font-size: 0.9em;
            margin-bottom: 25px;
        }
        .login-card {
            background: #1a2d3d;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            border: 1px solid #2a3f55;
        }
        .login-card h2 {
            color: white;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #2a3f55;
            background: #0d1a26;
            color: white;
            font-size: 1em;
            outline: none;
            transition: 0.2s;
        }
        .login-card input:focus {
            border-color: #f0c040;
            box-shadow: 0 0 0 2px rgba(240,192,64,0.2);
        }
        .login-card input::placeholder {
            color: #445566;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f0c040, #e6a800);
            color: #0f1923;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-card button:hover {
            transform: scale(1.02);
        }
        .erro {
            background: #3d1a1a;
            color: #ff5252;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9em;
        }
        .footer-login {
            margin-top: 20px;
            color: #445566;
            font-size: 0.8em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="logo">🎭</div>
    <div class="logo-text">StickerMania</div>
    <div class="logo-sub">Stickers animados exclusivos</div>

    <div class="login-card">
        <h2>Entrar na Loja</h2>
        {% if erro %}
        <div class="erro">⚠️ {{ erro }}</div>
        {% endif %}
        <form method="POST" action="/entrar">
            <input type="email" name="email" placeholder="Seu e-mail" required>
            <input type="text" name="apelido" placeholder="Seu apelido (opcional)">
            <button type="submit">🎭 ENTRAR</button>
        </form>
    </div>
    <div class="footer-login">StickerMania &copy; 2026</div>
</body>
</html>
